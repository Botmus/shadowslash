<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Side-car</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #569cd6; font-size: 1.2rem; }
        .controls { margin-bottom: 20px; }
        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .command-list {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
        .command-item {
            background-color: #2d2d2d;
            border: 1px solid #444;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .command-item:hover { background-color: #3d3d3d; border-color: #569cd6; }
        .cmd-text { font-family: 'Courier New', Courier, monospace; color: #ce9178; font-weight: bold; display: block; margin-bottom: 5px; }
        .cmd-desc { font-size: 0.9rem; color: #9cdcfe; }
        .copy-status { 
            position: fixed; bottom: 20px; right: 20px; 
            background: #4caf50; color: white; padding: 10px 20px; 
            border-radius: 4px; display: none; 
        }
    </style>
</head>
<body>
    <h2>Terminal Context</h2>
    <div class="controls">
        <select id="session-select">
            <option value="">Scanning sessions...</option>
        </select>
        <input type="text" id="search-input" placeholder="Search commands...">
    </div>
    
    <div class="command-list" id="command-list">
        <!-- Commands will appear here -->
    </div>

    <div id="copy-status" class="copy-status">Copied to clipboard!</div>

    <script>
        const sessionSelect = document.getElementById('session-select');
        const searchInput = document.getElementById('search-input');
        const commandList = document.getElementById('command-list');
        const copyStatus = document.getElementById('copy-status');

        let currentCommands = [];

        async function updateSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();
                
                const currentVal = sessionSelect.value;
                sessionSelect.innerHTML = '';
                
                if (sessions.length === 0) {
                    sessionSelect.innerHTML = '<option value="">No active terminals</option>';
                    return;
                }

                sessions.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.process;
                    opt.textContent = `${s.pts}: ${s.process}`;
                    if (opt.value === currentVal) opt.selected = true;
                    sessionSelect.appendChild(opt);
                });

                if (!currentVal && sessions.length > 0) {
                    loadCommands(sessions[0].process);
                }
            } catch (e) { console.error(e); }
        }

        async function loadCommands(context) {
            try {
                const res = await fetch(`/api/commands/${context}`);
                currentCommands = await res.json();
                renderCommands();
            } catch (e) { console.error(e); }
        }

        function renderCommands() {
            const query = searchInput.value.toLowerCase();
            commandList.innerHTML = '';
            
            const filtered = currentCommands.filter(c => 
                c.command.toLowerCase().includes(query) || 
                c.description.toLowerCase().includes(query)
            );

            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'command-item';
                div.innerHTML = `<span class="cmd-text">${c.command}</span><span class="cmd-desc">${c.description}</span>`;
                div.onclick = () => copyToClipboard(c.command);
                commandList.appendChild(div);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                copyStatus.style.display = 'block';
                setTimeout(() => copyStatus.style.display = 'none', 2000);
            });
        }

        sessionSelect.onchange = (e) => loadCommands(e.target.value);
        searchInput.oninput = renderCommands;

        setInterval(updateSessions, 2000);
        updateSessions();
    </script>
</body>
</html>
